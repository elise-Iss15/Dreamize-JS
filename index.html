<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div
      id="container"
      class="bg-gray-180 p-8 rounded-xl shadow-lg w-full max-w-md border border-slate-100"
    >
      <h2 class="text-2xl font-bold text-center">Skill section</h2>
      <p class="text-md text-gray-300 italic mb-6 text-center">
        (Fill the form with your name and skill.)
      </p>

      <form id="skill-form" class="space-y-8">
        <div id="userInput">
          <label
            for="name"
            class="block text-sm font-medium text-slate-700 mb-1"
            >Full Name</label
          >
          <input
            type="text"
            id="name"
            placeholder="Enter your name"
            class="w-full italic px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#d4af37] focus:border-[#d4af37] outline-none transition-all"
          />
        </div>

        <div id="userInput">
          <label
            for="skill"
            class="block text-sm font-medium text-slate-700 mb-1"
            >Skill</label
          >
          <input
            type="text"
            id="skill"
            placeholder="Enter your skill here"
            class="w-full italic px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#d4af37] focus:border-[#d4af37] outline-none transition-all"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-black hover:bg-[#d4af37] text-white font-semibold py-2.5 px-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-200 active:scale-[0.98]"
        >
          Add skill
        </button>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
